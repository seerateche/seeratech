server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # مسار فحص الصحة الخاص بـ Railway
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok";
    }

    # توجيه الـ SPA (React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # كاش الملفات الثابتة
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ملاحظة: تم إيقاف الـ Proxy الخاص بـ sira_api
    # لأن الـ Frontend في Railway بيتصل مباشرة برابط الـ API السحابي عن طريق VITE_API_BASE_URL
}
