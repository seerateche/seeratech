version: '3.9'

# ============================================================
# SEERA PLATFORM v4 - Full Infrastructure Stack
# ============================================================

networks:
  sira_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  postgres_data:
  redis_data:
  streams_data:
  uploads_data:
  wg_config:

services:

  # ── PostgreSQL ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: sira_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME:-sira_db}
      POSTGRES_USER:     ${DB_USER:-sira}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-sira_secure_2025}
      PGDATA:            /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "${DB_PORT:-5432}:5432"
    networks:
      sira_net:
        ipv4_address: 172.20.0.10
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-sira} -d ${DB_NAME:-sira_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Redis ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: sira_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-sira_redis_2025}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1
      --loglevel warning
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      sira_net:
        ipv4_address: 172.20.0.11
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-sira_redis_2025}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ── NestJS API ────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: sira_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV:          production
      PORT:              3001
      # Database
      DB_HOST:           postgres
      DB_PORT:           5432
      DB_NAME:           ${DB_NAME:-sira_db}
      DB_USER:           ${DB_USER:-sira}
      DB_PASSWORD:       ${DB_PASSWORD:-sira_secure_2025}
      # Redis
      REDIS_HOST:        redis
      REDIS_PORT:        6379
      REDIS_PASSWORD:    ${REDIS_PASSWORD:-sira_redis_2025}
      # JWT (CHANGE THESE IN PRODUCTION!)
      JWT_SECRET:         ${JWT_SECRET:-CHANGE_ME_JWT_SECRET_64_CHARS_MINIMUM_PLEASE}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-CHANGE_ME_REFRESH_SECRET_64_CHARS_MINIMUM}
      # AES-256-GCM key (64 hex chars = 32 bytes)
      ENCRYPTION_KEY:    ${ENCRYPTION_KEY:-a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0a1b2}
      # CORS
      CORS_ORIGINS:      ${CORS_ORIGINS:-http://localhost:5173,http://localhost:80}
      # Storage
      STORAGE_PATH:      /app/streams
      UPLOADS_PATH:      /app/uploads
    volumes:
      - streams_data:/app/streams
      - uploads_data:/app/uploads
    ports:
      - "${API_PORT:-3001}:3001"
    networks:
      sira_net:
        ipv4_address: 172.20.0.20
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── React Frontend ────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3001}
    container_name: sira_web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${WEB_PORT:-80}:80"
    networks:
      sira_net:
        ipv4_address: 172.20.0.30

  # ── WireGuard VPN (NAT Traversal) ─────────────────────────
  wireguard:
    image: linuxserver/wireguard:latest
    container_name: sira_wireguard
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      PUID:        1000
      PGID:        1000
      TZ:          Africa/Cairo
      SERVERURL:   ${WG_SERVER_URL:-auto}
      SERVERPORT:  ${WG_PORT:-51820}
      PEERS:       ${WG_PEERS:-10}
      PEERDNS:     auto
      INTERNAL_SUBNET: 10.13.13.0
      ALLOWEDIPS:  0.0.0.0/0
      LOG_CONFS:   true
    volumes:
      - wg_config:/config
      - /lib/modules:/lib/modules:ro
    ports:
      - "${WG_PORT:-51820}:51820/udp"
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv6.conf.all.disable_ipv6=1
    networks:
      sira_net:
        ipv4_address: 172.20.0.40

  # ── Nginx Reverse Proxy ────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: sira_nginx
    restart: unless-stopped
    depends_on:
      - api
      - web
    ports:
      - "443:443"
      - "8080:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/ssl:/etc/nginx/ssl:ro
    networks:
      sira_net:
        ipv4_address: 172.20.0.50
    profiles:
      - production
