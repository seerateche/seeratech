# ============================================================
# SEERA PLATFORM v4 — Cloud Build → Cloud Run (Web / SPA)
# ============================================================
# Builds apps/web (React+Vite) and deploys the static SPA (served by nginx)
# to Cloud Run.
#
# IMPORTANT: the API URL is baked into the JS bundle at BUILD time via
# VITE_API_BASE_URL. You MUST pass your deployed API URL:
#
#   gcloud builds submit --config cloudbuild.web.yaml \
#     --substitutions=_REGION=europe-west1,_API_URL=https://seera-api-xxxx.a.run.app
#
# (Deploy the API first, copy its https URL, then build the web.)
# ============================================================

substitutions:
  _SERVICE: seera-web
  _REGION: europe-west1
  _REPO: seera
  _API_URL: 'https://REPLACE_WITH_API_URL'   # deployed API base URL

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

images:
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/web:$COMMIT_SHA'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/web:latest'

steps:
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - apps/web/Dockerfile
      - --build-arg
      - 'VITE_API_BASE_URL=${_API_URL}'
      - -t
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/web:$COMMIT_SHA'
      - -t
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/web:latest'
      - .

  - id: push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/web'

  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - '${_SERVICE}'
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/web:$COMMIT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --cpu=1
      - --memory=256Mi
      - --min-instances=0
      - --max-instances=4
